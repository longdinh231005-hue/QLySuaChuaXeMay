spring.application.name=qlsuachuaxemay
# Cấu hình kết nối MS SQL Server (Cho máy của bạn - Hãy sửa sa/mật khẩu nếu cần)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=QLSuaChuaXeMay;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Cấu hình kết nối MySQL (Comment lại để người khác không bị ảnh hưởng)
# spring.datasource.url=jdbc:mysql://localhost:3306/QLSuaChuaXeMay?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=12345

# Cấu hình Hibernate (Tự động cập nhật cấu trúc bảng nếu có thay đổi trong code)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl