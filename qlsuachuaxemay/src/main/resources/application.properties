spring.application.name=qlsuachuaxemay
# Cấu hình kết nối MySQL (Đổi "root" và "matkhau" theo cấu hình máy của bạn)
spring.datasource.url=jdbc:mysql://localhost:3306/QLSuaChuaXeMay?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345

# Cấu hình Hibernate (Tự động cập nhật cấu trúc bảng nếu có thay đổi trong code)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl