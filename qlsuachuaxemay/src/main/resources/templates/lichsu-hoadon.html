<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Lịch Sử Hóa Đơn - Gara Auto</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      .sidebar {
        min-height: 100vh;
        background-color: #212529;
        width: 250px;
      }
      .sidebar a {
        color: #adb5bd;
        text-decoration: none;
        padding: 15px 20px;
        display: block;
        font-weight: 500;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background-color: #0d6efd;
        color: white;
      }
      .content-area {
        flex-grow: 1;
        background-color: #f4f6f9;
      }
    </style>
  </head>
  <body class="d-flex">
    <div class="sidebar">
      <h4
        class="text-white text-center py-4 border-bottom border-secondary m-0"
      >
        <i class="fa-solid fa-motorcycle me-2"></i>GARA AUTO
      </h4>
      <div class="mt-3">
        <a href="/baocao"
          ><i class="fa-solid fa-chart-pie me-2"></i> Báo cáo thống kê</a
        >
        <a href="/thanhtoan"
          ><i class="fa-solid fa-cash-register me-2"></i> Quản lý Thanh toán</a
        >
        <a href="/lichsu-hoadon" class="active"
          ><i class="fa-solid fa-file-invoice-dollar me-2"></i> Lịch sử Hóa
          đơn</a
        >
      </div>
    </div>

    <div class="content-area p-4">
      <h2 class="h4 mb-4 fw-bold">Lịch Sử Giao Dịch & Hóa Đơn</h2>

      <div class="card shadow-sm border-0">
        <div class="card-body">
          <div class="table-responsive">
            <table
              class="table table-hover table-bordered align-middle text-center"
            >
              <thead class="table-light">
                <tr>
                  <th>Mã HĐ</th>
                  <th>Mã Phiếu</th>
                  <th>Thời Gian Thanh Toán</th>
                  <th>Tiền Phụ Tùng</th>
                  <th>Tiền Công</th>
                  <th>Tổng Doanh Thu</th>
                  <th>Thu Ngân</th>
                  <th>Thao Tác</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="hd : ${listHoaDon}">
                  <td><strong th:text="'#HD' + ${hd.maHD}"></strong></td>
                  <td th:text="'#PSC' + ${hd.phieuSuaChua.maPhieu}"></td>
                  <td
                    th:text="${#temporals.format(hd.ngayThanhToan, 'dd/MM/yyyy HH:mm')}"
                  ></td>
                  <td th:text="${hd.tongTienPhuTung} + ' đ'"></td>
                  <td th:text="${hd.tongTienCong} + ' đ'"></td>
                  <td
                    class="text-success fw-bold"
                    th:text="${hd.thanhTien} + ' đ'"
                  ></td>
                  <td>
                    <button
                      class="btn btn-outline-info btn-sm me-1"
                      title="Xem chi tiết"
                    >
                      <i class="fa-solid fa-eye"></i>
                    </button>
                    <button
                      class="btn btn-outline-secondary btn-sm"
                      title="In Hóa Đơn"
                    >
                      <i class="fa-solid fa-print"></i>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
