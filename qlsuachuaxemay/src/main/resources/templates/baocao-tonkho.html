<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Báo Cáo Tồn Kho - Gara Auto</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      .sidebar {
        min-height: 100vh;
        background-color: #212529;
        width: 250px;
      }
      .sidebar a {
        color: #adb5bd;
        text-decoration: none;
        padding: 15px 20px;
        display: block;
        font-weight: 500;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background-color: #0d6efd;
        color: white;
      }
      .content-area {
        flex-grow: 1;
        background-color: #f4f6f9;
      }
    </style>
  </head>
  <body class="d-flex">
    <div class="sidebar">
      <h4
        class="text-white text-center py-4 border-bottom border-secondary m-0"
      >
        <i class="fa-solid fa-motorcycle me-2"></i>GARA AUTO
      </h4>
      <div class="mt-3">
        <a href="/baocao" class="active"
          ><i class="fa-solid fa-chart-pie me-2"></i> Báo cáo thống kê</a
        >
        <a href="/thanhtoan"
          ><i class="fa-solid fa-cash-register me-2"></i> Quản lý Thanh toán</a
        >
        <a href="/lichsu-hoadon"
          ><i class="fa-solid fa-file-invoice-dollar me-2"></i> Lịch sử Hóa
          đơn</a
        >
      </div>
    </div>

    <div class="content-area p-4">
      <div class="mb-3">
        <a href="/baocao" class="text-decoration-none text-muted"
          ><i class="fa-solid fa-arrow-left me-1"></i> Quay lại Tổng quan</a
        >
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 m-0 fw-bold text-danger">
          <i class="fa-solid fa-box me-2"></i>Báo Cáo Cảnh Báo Tồn Kho
        </h2>
        <button class="btn btn-success">
          <i class="fa-solid fa-file-excel me-2"></i> Xuất danh mục cần nhập
        </button>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <table
            class="table table-striped table-hover text-center align-middle mb-0"
          >
            <thead class="table-dark">
              <tr>
                <th>Mã PT</th>
                <th class="text-start">Tên Phụ Tùng</th>
                <th>Đơn Vị Tính</th>
                <th>Tồn Kho Hiện Tại</th>
                <th>Mức Tối Thiểu</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="pt : ${dsPhuTung}">
                <td class="fw-bold" th:text="${pt.maPT}"></td>
                <td class="text-start" th:text="${pt.tenPT}"></td>
                <td th:text="${pt.donViTinh}"></td>
                <td
                  class="text-danger fw-bold fs-5"
                  th:text="${pt.soLuongTon}"
                ></td>
                <td th:text="${pt.tonKhoToiThieu}"></td>
              </tr>
              <tr th:if="${#lists.isEmpty(dsPhuTung)}">
                <td colspan="5" class="text-success py-3 fw-bold">
                  Kho đang ở mức an toàn, không có linh kiện nào thiếu hụt.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
