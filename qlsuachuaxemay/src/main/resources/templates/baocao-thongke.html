<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Báo Cáo Thống Kê - Gara Auto</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      .sidebar {
        min-height: 100vh;
        background-color: #212529;
        width: 250px;
      }
      .sidebar a {
        color: #adb5bd;
        text-decoration: none;
        padding: 15px 20px;
        display: block;
        font-weight: 500;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background-color: #0d6efd;
        color: white;
      }
      .content-area {
        flex-grow: 1;
        background-color: #f4f6f9;
      }
      .stat-card {
        border-radius: 10px;
        color: white;
        transition: transform 0.2s;
        cursor: pointer;
        text-decoration: none;
      }
      .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2) !important;
      }
    </style>
  </head>
  <body class="d-flex">
    <div class="sidebar">
      <h4
        class="text-white text-center py-4 border-bottom border-secondary m-0"
      >
        <i class="fa-solid fa-motorcycle me-2"></i>GARA AUTO
      </h4>
      <div class="mt-3">
        <a href="/baocao" class="active"
          ><i class="fa-solid fa-chart-pie me-2"></i> Báo cáo thống kê</a
        >
        <a href="/thanhtoan"
          ><i class="fa-solid fa-cash-register me-2"></i> Quản lý Thanh toán</a
        >
        <a href="/lichsu-hoadon"
          ><i class="fa-solid fa-file-invoice-dollar me-2"></i> Lịch sử Hóa
          đơn</a
        >
      </div>
    </div>

    <div class="content-area p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 m-0 fw-bold">Tổng Quan Hệ Thống (Tháng Này)</h2>
        <div class="d-flex align-items-center">
          <span class="me-3"
            >Xin chào,
            <strong
              th:text="${session.userLogon != null ? session.userLogon.hoTen : 'Nhân viên'}"
              >Quản lý Long</strong
            ></span
          >
          <a href="/logout" class="btn btn-outline-danger btn-sm"
            ><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a
          >
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-4">
          <a
            href="/baocao-doanhthu"
            class="card stat-card bg-primary shadow-sm border-0 h-100 p-3"
          >
            <div
              class="card-body d-flex justify-content-between align-items-center"
            >
              <div>
                <h6 class="text-uppercase fw-bold mb-1">Báo Cáo Doanh Thu</h6>
                <h3 class="m-0">1,560,000 đ</h3>
                <small class="text-white-50 mt-2 d-block"
                  >Click để xem chi tiết <i class="fa-solid fa-arrow-right"></i
                ></small>
              </div>
              <i class="fa-solid fa-wallet fa-3x opacity-50"></i>
            </div>
          </a>
        </div>

        <div class="col-md-4">
          <a
            href="/baocao-suachua"
            class="card stat-card bg-success shadow-sm border-0 h-100 p-3"
          >
            <div
              class="card-body d-flex justify-content-between align-items-center"
            >
              <div>
                <h6 class="text-uppercase fw-bold mb-1">Báo Cáo Xe Sửa Chữa</h6>
                <h3 class="m-0">10 Lượt</h3>
                <small class="text-white-50 mt-2 d-block"
                  >Click để xem chi tiết <i class="fa-solid fa-arrow-right"></i
                ></small>
              </div>
              <i class="fa-solid fa-tools fa-3x opacity-50"></i>
            </div>
          </a>
        </div>

        <div class="col-md-4">
          <a
            href="/baocao-tonkho"
            class="card stat-card bg-danger shadow-sm border-0 h-100 p-3"
          >
            <div
              class="card-body d-flex justify-content-between align-items-center"
            >
              <div>
                <h6 class="text-uppercase fw-bold mb-1">Báo Cáo Tồn Kho</h6>
                <h3 class="m-0">3 Món Cần Nhập</h3>
                <small class="text-white-50 mt-2 d-block"
                  >Click để xem chi tiết <i class="fa-solid fa-arrow-right"></i
                ></small>
              </div>
              <i class="fa-solid fa-boxes-stacked fa-3x opacity-50"></i>
            </div>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
