<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' - Gara Auto'">Form Khách Hàng</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      .sidebar {
        min-height: 100vh;
        background-color: #212529;
        width: 250px;
        flex-shrink: 0;
      }
      .sidebar a {
        color: #adb5bd;
        text-decoration: none;
        padding: 15px 20px;
        display: block;
        font-weight: 500;
        transition: all 0.3s;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background-color: #0d6efd;
        color: white;
      }
      .content-area {
        flex-grow: 1;
        background-color: #f4f6f9;
        min-height: 100vh;
      }
      .card {
        border-radius: 12px;
      }
    </style>
  </head>
  <body class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar">
      <h4 class="text-white text-center py-4 border-bottom border-secondary m-0">
        <i class="fa-solid fa-motorcycle me-2"></i>GARA AUTO
      </h4>
      <div class="mt-3">
        <a href="/baocao"><i class="fa-solid fa-chart-pie me-2"></i> Báo cáo thống kê</a>
        <a href="/thanhtoan"><i class="fa-solid fa-cash-register me-2"></i> Quản lý Thanh toán</a>
        <a href="/lichsu-hoadon"><i class="fa-solid fa-file-invoice-dollar me-2"></i> Lịch sử Hóa đơn</a>
        <a href="/customers" class="active"><i class="fa-solid fa-users me-2"></i> Quản lý Khách hàng</a>
        <a href="/motorbikes"><i class="fa-solid fa-motorcycle me-2"></i> Quản lý Xe máy</a>
      </div>
    </div>

    <!-- Content -->
    <div class="content-area p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 m-0 fw-bold" th:text="${pageTitle}">Thêm Khách Hàng</h2>
        <a href="/customers" class="btn btn-outline-secondary btn-sm fw-bold">
          <i class="fa-solid fa-arrow-left"></i> Quay lại danh sách
        </a>
      </div>

      <!-- Flash Message Errors -->
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-circle-xmark me-2"></i> <span th:text="${errorMessage}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <div class="card shadow-sm border-0 max-w-2xl mx-auto col-md-8 offset-md-2">
        <div class="card-body p-4">
          <form th:action="${customer.id == 0} ? @{/customers/add} : @{/customers/edit/{id}(id=${customer.id})}" 
                th:object="${customer}" 
                method="post">
            
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
              <label for="fullName" class="form-label fw-bold">Họ và Tên <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                <input type="text" class="form-control" id="fullName" th:field="*{fullName}" placeholder="Nhập họ và tên khách hàng" required />
              </div>
            </div>

            <div class="mb-3">
              <label for="phoneNumber" class="form-label fw-bold">Số Điện Thoại <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                <input type="tel" class="form-control" id="phoneNumber" th:field="*{phoneNumber}" placeholder="Nhập số điện thoại khách hàng" required />
              </div>
            </div>

            <div class="mb-4">
              <label for="address" class="form-label fw-bold">Địa Chỉ</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-location-dot"></i></span>
                <input type="text" class="form-control" id="address" th:field="*{address}" placeholder="Nhập địa chỉ khách hàng" />
              </div>
            </div>

            <div class="d-flex gap-2 justify-content-end">
              <a href="/customers" class="btn btn-light px-4">Hủy bỏ</a>
              <button type="submit" class="btn btn-primary px-5 fw-bold">Lưu lại</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
