<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Thanh Toán - Gara Auto</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      .sidebar {
        min-height: 100vh;
        background-color: #212529;
        width: 250px;
      }
      .sidebar a {
        color: #adb5bd;
        text-decoration: none;
        padding: 15px 20px;
        display: block;
        font-weight: 500;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background-color: #0d6efd;
        color: white;
      }
      .content-area {
        flex-grow: 1;
        background-color: #f4f6f9;
      }
    </style>
  </head>
  <body class="d-flex">
    <div class="sidebar">
      <h4
        class="text-white text-center py-4 border-bottom border-secondary m-0"
      >
        <i class="fa-solid fa-motorcycle me-2"></i>GARA AUTO
      </h4>
      <div class="mt-3">
        <a href="/baocao"
          ><i class="fa-solid fa-chart-pie me-2"></i> Báo cáo thống kê</a
        >
        <a href="/thanhtoan" class="active"
          ><i class="fa-solid fa-cash-register me-2"></i> Quản lý Thanh toán</a
        >
        <a href="/lichsu-hoadon"
          ><i class="fa-solid fa-file-invoice-dollar me-2"></i> Lịch sử Hóa
          đơn</a
        >
      </div>
    </div>

    <div class="content-area p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 m-0 fw-bold">Danh Sách Phiếu Sửa Chữa (Chờ Thu Tiền)</h2>
        <div class="d-flex align-items-center">
          <span
            >Xin chào,
            <strong
              th:text="${session.userLogon != null ? session.userLogon.hoTen : 'Nhân viên'}"
            ></strong
          ></span>
          <a href="/login" class="btn btn-outline-danger btn-sm"
            ><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a
          >
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body">
          <div class="row mb-3">
            <div class="col-md-5">
              <div class="input-group">
                <span class="input-group-text bg-white"
                  ><i class="fa-solid fa-search"></i
                ></span>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Tìm theo Mã phiếu, Biển số hoặc Tên khách hàng..."
                />
                <button class="btn btn-primary">Tìm kiếm</button>
              </div>
            </div>
          </div>

          <div class="table-responsive">
            <table
              class="table table-hover table-bordered align-middle text-center"
            >
              <thead class="table-dark">
                <tr>
                  <th>Mã Phiếu</th>
                  <th>Khách Hàng</th>
                  <th>Biển Số</th>
                  <th>Mô Tả Lỗi</th>
                  <th>Tổng Tiền (Dự kiến)</th>
                  <th>Trạng Thái</th>
                  <th>Thao Tác</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="phieu : ${listPhieu}">
                  <td class="fw-bold" th:text="'#PSC' + ${phieu.maPhieu}"></td>
                  <td th:text="${phieu.xeMay.khachHang.hoTen}">
                    Tên khách hàng
                  </td>
                  <td th:text="${phieu.bienSo}"></td>
                  <td class="text-start" th:text="${phieu.moTaLoi}"></td>
                  <td>
                    <span
                      th:if="${phieu.trangThai == 'ChuaSua'}"
                      class="badge bg-secondary"
                      >Chưa sửa</span
                    >
                    <span
                      th:if="${phieu.trangThai == 'DangSua'}"
                      class="badge bg-primary"
                      >Đang sửa</span
                    >
                    <span
                      th:if="${phieu.trangThai == 'DaSuaXong'}"
                      class="badge bg-warning text-dark"
                      >Chờ thanh toán</span
                    >
                    <span
                      th:if="${phieu.trangThai == 'DaThanhToan'}"
                      class="badge bg-success"
                      >Đã thanh toán</span
                    >
                  </td>
                  <td>
                    <a
                      th:if="${phieu.trangThai == 'DaSuaXong'}"
                      th:href="@{/thanhtoan/xacnhan/{id}(id=${phieu.maPhieu})}"
                      class="btn btn-success btn-sm fw-bold"
                    >
                      <i class="fa-solid fa-check-circle me-1"></i> Xác nhận Đã
                      thanh toán
                    </a>
                    <button
                      th:if="${phieu.trangThai == 'DaThanhToan'}"
                      class="btn btn-outline-secondary btn-sm"
                      disabled
                    >
                      <i class="fa-solid fa-lock"></i> Đã hoàn tất
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
