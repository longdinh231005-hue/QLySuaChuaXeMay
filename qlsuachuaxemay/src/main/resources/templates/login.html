<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - Hệ Thống Sửa Chữa Xe Máy</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      body {
        background-color: #f4f6f9;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        width: 100%;
        max-width: 400px;
        border-radius: 10px;
        border: none;
      }
      .icon-bg {
        background: #0d6efd;
        color: white;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        margin: -40px auto 20px;
        font-size: 24px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="card shadow-lg login-card">
      <div class="card-body p-4">
        <div class="icon-bg">
          <i class="fa-solid fa-user-tie"></i>
        </div>

        <h4 class="text-center mb-4 fw-bold">ĐĂNG NHẬP HỆ THỐNG</h4>

        <form action="/login" method="post">
          <div class="mb-3">
            <label class="form-label fw-bold">Email đăng nhập</label>
            <div class="input-group">
              <span class="input-group-text bg-white"
                ><i class="fa-solid fa-envelope"></i
              ></span>
              <input
                type="email"
                class="form-control"
                name="email"
                placeholder="VD: longdinh@gmail.com"
                required
              />
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">Mật khẩu</label>
            <div class="input-group">
              <span class="input-group-text bg-white"
                ><i class="fa-solid fa-lock"></i
              ></span>
              <input
                type="password"
                class="form-control"
                name="password"
                placeholder="Nhập mật khẩu"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-5">
            <i class="fa-solid fa-right-to-bracket me-2"></i> Đăng Nhập
          </button>
        </form>

        <div class="text-center mt-3">
          <small class="text-muted">Gara Sửa Chữa Xe Máy - Phiên bản 1.0</small>
        </div>
      </div>
    </div>
  </body>
</html>
