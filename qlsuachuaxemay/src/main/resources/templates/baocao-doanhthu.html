<h2 class="h4 mb-4 fw-bold text-primary">
  <i class="fa-solid fa-wallet me-2"></i>Báo Cáo Chi Tiết Doanh Thu
</h2>
<button class="btn btn-success mb-3">
  <i class="fa-solid fa-file-excel me-2"></i> Xuất file báo cáo Doanh Thu
</button>
<table class="table table-hover table-bordered text-center">
  <thead class="table-dark">
    <tr>
      <th>Mã HĐ</th>
      <th>Ngày Thu</th>
      <th>Tiền Phụ Tùng</th>
      <th>Tiền Công</th>
      <th>Tổng Tiền</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="hd : ${dsHoaDon}">
      <td th:text="'#HD' + ${hd.maHD}"></td>
      <td th:text="${#dates.format(hd.ngayThanhToan, 'dd/MM/yyyy HH:mm')}"></td>
      <td th:text="${hd.tongTienPhuTung} + ' đ'"></td>
      <td th:text="${hd.tongTienCong} + ' đ'"></td>
      <td class="text-danger fw-bold" th:text="${hd.thanhTien} + ' đ'"></td>
    </tr>
  </tbody>
</table>
